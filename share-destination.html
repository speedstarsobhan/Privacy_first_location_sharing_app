<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Privacy-focused destination sharing page for Google Maps links.">
  <title>Share destination</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --text: #111111;
      --muted: #666666;
      --border: #d7d7d7;
      --button: #111111;
      --button-text: #ffffff;
      --success-bg: #edf7ed;
      --success-text: #0f5132;
      --success-border: #badbcc;
      --error-bg: #fdf0f0;
      --error-text: #842029;
      --error-border: #f5c2c7;
      --focus: #111111;
      --radius: 12px;
      --gap: 14px;
      --maxw: 420px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f10;
        --surface: #161718;
        --text: #f5f5f5;
        --muted: #b4b4b4;
        --border: #33363a;
        --button: #f5f5f5;
        --button-text: #111111;
        --success-bg: #112218;
        --success-text: #9ee2ba;
        --success-border: #244632;
        --error-bg: #2b171a;
        --error-text: #ffb3ba;
        --error-border: #5a2a32;
        --focus: #f5f5f5;
      }
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    main {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: var(--maxw);
      background: var(--surface);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    form {
      margin-top: 18px;
    }

    .stack > * + * {
      margin-top: var(--gap);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
    }

    input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text);
      font: inherit;
    }

    input::placeholder {
      color: var(--muted);
      opacity: 1;
    }

    input:focus,
    button:focus,
    a:focus {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: var(--radius);
      background: var(--button);
      color: var(--button-text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button[disabled] {
      opacity: 0.72;
      cursor: wait;
    }

    .meta {
      font-size: 0.95rem;
    }

    .privacy {
      font-size: 0.92rem;
    }

    .message {
      display: none;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
    }

    .message.show { display: block; }
    .message.success {
      background: var(--success-bg);
      color: var(--success-text);
      border-color: var(--success-border);
    }
    .message.error {
      background: var(--error-bg);
      color: var(--error-text);
      border-color: var(--error-border);
    }

    .hidden { display: none !important; }

    .help {
      font-size: 0.92rem;
    }

    .footer-link {
      color: inherit;
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="title">
      <h1 id="title">Share destination</h1>
      <p class="meta">Paste a Google Maps share link to send your destination.</p>

      <form id="ride-form" class="stack" method="post" action="/api/request" novalidate>
        <div>
          <label for="mapsLink">Paste Google Maps link</label>
          <input
            id="mapsLink"
            name="mapsLink"
            type="url"
            inputmode="url"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="https://maps.app.goo.gl/..."
            aria-describedby="helper privacy message"
            required
          >
        </div>

        <button id="submitBtn" type="submit">Send</button>

        <p id="helper" class="help">Open Google Maps, tap Share, copy the link, then paste it here.</p>
        <p id="privacy" class="privacy">No name, phone number, or note is collected.</p>
        <div id="message" class="message" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script>
    (function () {
      const form = document.getElementById('ride-form');
      const input = document.getElementById('mapsLink');
      const button = document.getElementById('submitBtn');
      const message = document.getElementById('message');

      const allowedHosts = new Set([
        'google.com',
        'www.google.com',
        'maps.google.com',
        'maps.app.goo.gl',
        'goo.gl'
      ]);

      function setMessage(type, text) {
        message.className = 'message show ' + type;
        message.textContent = text;
      }

      function clearMessage() {
        message.className = 'message';
        message.textContent = '';
      }

      function isAllowedMapsUrl(value) {
        try {
          const url = new URL(value.trim());
          const host = url.hostname.toLowerCase();
          if (url.protocol !== 'https:') return false;
          if (allowedHosts.has(host)) return true;
          return host.endsWith('.google.com');
        } catch {
          return false;
        }
      }

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        clearMessage();

        const mapsLink = input.value.trim();

        if (!mapsLink) {
          setMessage('error', 'Paste a Google Maps link.');
          input.focus();
          return;
        }

        if (!isAllowedMapsUrl(mapsLink)) {
          setMessage('error', 'Use a valid Google Maps share link.');
          input.focus();
          return;
        }

        button.disabled = true;
        button.textContent = 'Sending...';

        try {
          const response = await fetch(form.action, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ mapsLink })
          });

          if (!response.ok) {
            throw new Error('Request failed');
          }

          setMessage('success', 'Destination shared successfully. You can close this page.');
          form.reset();
        } catch (error) {
          setMessage('error', 'Could not send right now. Please try again.');
        } finally {
          button.disabled = false;
          button.textContent = 'Send';
        }
      });
    })();
  </script>
</body>
</html>
